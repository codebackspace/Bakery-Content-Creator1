kind = "web"
previewPath = "/"
title = "Sweet Crumbs Bakery"
version = "1.0.0"
id = "artifacts/bakery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23375
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bakery run dev"

[services.env]
PORT = "23375"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bakery", "run", "build"]
publicDir = "artifacts/bakery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
